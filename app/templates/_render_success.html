<div class="border-l-4 border-green-500 bg-green-50 p-3 text-sm">
  <div class="text-xs text-gray-500 mb-1">
    Rendered for <code>{{ target }}</code>
  </div>
  <code class="block mb-2 break-all">{{ query }}</code>
  <a href="{{ url }}" target="_blank" rel="noopener noreferrer"
     class="text-blue-700 underline break-all">
    {{ url }}
  </a>
  <p class="text-xs text-gray-500 mt-2">
    Click to open in your own browser. The app never fetches Google for you.
  </p>
</div>
