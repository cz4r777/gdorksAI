<div class="border-l-4 border-red-500 bg-red-50 p-3 text-sm">
  <div class="font-medium">Refused: {{ reason }}</div>
  <div class="text-xs text-gray-700 mt-1">{{ detail }}</div>
  {% if reason == "out of scope" and target %}
  <div class="mt-4 border-t border-red-200 pt-3" data-testid="authorize-block">
    <p class="text-sm text-gray-700 mb-3">
      Click below to authorize <code class="font-semibold">{{ target }}</code>
      for this engagement. You confirm you have written authorization to test it.
    </p>
    <form action="/scope/authorize" method="post" class="space-y-2">
      <input type="hidden" name="target" value="{{ target }}">
      <input type="hidden" name="next_path" value="/">
      <button class="block w-full bg-red-700 hover:bg-red-800 text-white text-sm font-semibold px-4 py-3 rounded shadow"
              data-testid="authorize-button">
        ✓ I am authorized — add <code>{{ target }}</code> to scope
      </button>
      <p class="text-[10px] text-gray-500 text-center">
        appends to <code>runtime/scope.json</code> and reloads this page
      </p>
    </form>
  </div>
  {% endif %}
</div>
